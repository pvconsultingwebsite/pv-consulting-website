</head>
<body>
  <header>
    <div class="nav">
      <a class="brand" href="index.html"><div class="logo" aria-hidden="true"></div><div>PV Consulting</div></a>
      <nav class="navlinks">

    </div>

  <main class="wrap">
    <section style="padding:28px 0 10px;">
  <div class="kicker">Dynamics Resources</div>
  <h1>Resource hub for Dynamics 365 builders.</h1>
  <div class="controls">
    <input id="q" type="search" placeholder="Search resources..." style="min-width:260px; flex:1;" />
    <span id="count" class="small" style="color:var(--muted)"></span>
  </div>
  <div id="resources" style="display:grid; gap:14px; margin-top:12px;"></div>
</section>
    <footer><div class="small">© <span id="year"></span> PV Consulting. All rights reserved.</div></footer>
  </main>
  <script src="assets/site.js"></script>
  <script id="resources-json" type="application/json">[{"title": "Dynamics 365 Plugin Template (C#)", "category": "Development", "level": "Intermediate", "desc": "Production-ready plugin skeleton: tracing, depth guard, validation helpers, and common patterns.", "link": "#", "tags": ["C#", "Plugin", "Tracing", "Validation"]}, {"title": "Integration Pattern: D365 \u2194 SAP via Logic Apps", "category": "Integrations", "level": "Advanced", "desc": "Event-driven integration using Service Bus + Logic Apps/Functions with retries + DLQ handling.", "link": "#", "tags": ["SAP", "Logic Apps", "Service Bus", "Retries"]}]</script><script>const RESOURCES = JSON.parse(document.getElementById('resources-json').textContent);
function escapeHtml(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");}
function render(list){
  const host=document.getElementById('resources'); host.innerHTML='';
  if(!list.length){host.innerHTML=`<div class="card"><strong>No results.</strong><div class="resource-meta">Try clearing filters.</div></div>`; return;}
  for(const r of list){
    const el=document.createElement('div'); el.className='card';
    el.innerHTML=`<h3 style="margin:0 0 6px;">${escapeHtml(r.title)}</h3>
    <div class="resource-meta">${escapeHtml(r.category)} • ${escapeHtml(r.level)}</div>
    <p style="margin:12px 0 0; color:var(--muted)">${escapeHtml(r.desc)}</p>
    <div>${(r.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>`;
    host.appendChild(el);
  }
}
function applyFilters(){
  const q=(document.getElementById('q').value||'').trim().toLowerCase();
  const filtered=RESOURCES.filter(r=> (r.title+' '+r.desc).toLowerCase().includes(q));
  render(filtered);
  document.getElementById('count').textContent = `${filtered.length} resources`;
}
document.getElementById('q').addEventListener('input', applyFilters);
applyFilters();</script>
</body>
</html>
